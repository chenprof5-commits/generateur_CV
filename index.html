<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Générateur de CV en ligne</title>
  <meta name="description" content="Créez votre CV professionnel en ligne et téléchargez-le en PDF instantanément." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <!-- PDF generation (client-side, no server needed) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body>
  <header class="top-bar">
    <div class="logo">
      <span class="logo-icon">📄</span>
      <span>CV<strong>Builder</strong></span>
    </div>
    <div class="header-actions">
      <button class="btn-preview" onclick="togglePreview()" id="previewToggle">👁 Aperçu</button>
      <button class="btn-download" onclick="generatePDF()" id="downloadBtn">
        <span class="btn-icon">⬇</span> Télécharger PDF
      </button>
    </div>
  </header>

  <div class="app-layout" id="appLayout">
    <!-- ============ FORM PANEL ============ -->
    <div class="form-panel" id="formPanel">
      <div class="form-scroll">

        <!-- PERSONAL INFO -->
        <section class="form-section">
          <div class="section-header">
            <span class="section-icon">👤</span>
            <h2>Informations personnelles</h2>
          </div>
          <div class="form-grid">
            <div class="form-group">
              <label for="firstName">Prénom *</label>
              <input type="text" id="firstName" placeholder="Jean" oninput="updatePreview()" />
            </div>
            <div class="form-group">
              <label for="lastName">Nom *</label>
              <input type="text" id="lastName" placeholder="Dupont" oninput="updatePreview()" />
            </div>
            <div class="form-group full">
              <label for="jobTitle">Titre / Poste souhaité</label>
              <input type="text" id="jobTitle" placeholder="Développeur Full Stack" oninput="updatePreview()" />
            </div>
            <div class="form-group">
              <label for="email">Email</label>
              <input type="email" id="email" placeholder="jean@email.com" oninput="updatePreview()" />
            </div>
            <div class="form-group">
              <label for="phone">Téléphone</label>
              <input type="tel" id="phone" placeholder="+33 6 00 00 00 00" oninput="updatePreview()" />
            </div>
            <div class="form-group full">
              <label for="address">Adresse</label>
              <input type="text" id="address" placeholder="75001 Paris, France" oninput="updatePreview()" />
            </div>
            <div class="form-group">
              <label for="linkedin">LinkedIn</label>
              <input type="text" id="linkedin" placeholder="linkedin.com/in/jean-dupont" oninput="updatePreview()" />
            </div>
            <div class="form-group">
              <label for="website">Site web</label>
              <input type="text" id="website" placeholder="www.jeandupont.fr" oninput="updatePreview()" />
            </div>
            <div class="form-group full">
              <label for="photo">Photo (optionnel)</label>
              <div class="photo-upload-area" onclick="document.getElementById('photoInput').click()">
                <div id="photoPreviewWrap">
                  <div class="upload-icon">📷</div>
                  <p>Cliquez pour choisir une photo</p>
                </div>
                <img id="photoImg" class="photo-thumb" style="display:none" alt="Photo de profil" />
              </div>
              <input type="file" id="photoInput" accept="image/*" style="display:none" onchange="handlePhoto(this)" />
            </div>
          </div>
        </section>

        <!-- SUMMARY -->
        <section class="form-section">
          <div class="section-header">
            <span class="section-icon">💬</span>
            <h2>Profil / Résumé</h2>
          </div>
          <div class="form-group">
            <label for="summary">Présentation professionnelle</label>
            <textarea id="summary" rows="4"
              placeholder="Décrivez votre profil en quelques phrases : expérience, compétences clés, objectifs..."
              oninput="updatePreview()"></textarea>
          </div>
        </section>

        <!-- EXPERIENCES -->
        <section class="form-section">
          <div class="section-header">
            <span class="section-icon">💼</span>
            <h2>Expériences professionnelles</h2>
            <button class="btn-add" onclick="addExperience()">+ Ajouter</button>
          </div>
          <div id="experiences-container"></div>
        </section>

        <!-- EDUCATIONS -->
        <section class="form-section">
          <div class="section-header">
            <span class="section-icon">🎓</span>
            <h2>Formations</h2>
            <button class="btn-add" onclick="addEducation()">+ Ajouter</button>
          </div>
          <div id="educations-container"></div>
        </section>

        <!-- SKILLS -->
        <section class="form-section">
          <div class="section-header">
            <span class="section-icon">⚡</span>
            <h2>Compétences</h2>
            <button class="btn-add" onclick="addSkill()">+ Ajouter</button>
          </div>
          <div id="skills-container"></div>
        </section>

        <!-- LANGUAGES -->
        <section class="form-section">
          <div class="section-header">
            <span class="section-icon">🌍</span>
            <h2>Langues</h2>
            <button class="btn-add" onclick="addLanguage()">+ Ajouter</button>
          </div>
          <div id="languages-container"></div>
        </section>

        <!-- THEME -->
        <section class="form-section">
          <div class="section-header">
            <span class="section-icon">🎨</span>
            <h2>Thème de couleur</h2>
          </div>
          <div class="theme-picker">
            <label class="theme-option active" id="theme-blue" title="Bleu professionnel">
              <input type="radio" name="theme" value="blue" checked onchange="updatePreview()" />
              <span class="theme-dot" style="background:#1e40af"></span>
              Bleu
            </label>
            <label class="theme-option" id="theme-green" title="Vert émeraude">
              <input type="radio" name="theme" value="green" onchange="updatePreview()" />
              <span class="theme-dot" style="background:#0f766e"></span>
              Vert
            </label>
            <label class="theme-option" id="theme-red" title="Rouge bordeaux">
              <input type="radio" name="theme" value="red" onchange="updatePreview()" />
              <span class="theme-dot" style="background:#be123c"></span>
              Rouge
            </label>
            <label class="theme-option" id="theme-purple" title="Violet élégant">
              <input type="radio" name="theme" value="purple" onchange="updatePreview()" />
              <span class="theme-dot" style="background:#7c3aed"></span>
              Violet
            </label>
          </div>
        </section>

        <div class="form-footer">
          <button class="btn-generate" onclick="generatePDF()" id="generateBtn">
            <span>⬇</span> Générer et télécharger le PDF
          </button>
        </div>

      </div><!-- /form-scroll -->
    </div><!-- /form-panel -->

    <!-- ============ PREVIEW PANEL ============ -->
    <div class="preview-panel" id="previewPanel">
      <div class="preview-header">
        <span>Aperçu du CV</span>
        <span class="preview-badge">Mise à jour en temps réel</span>
      </div>
      <div class="preview-wrapper">
        <div class="cv-preview" id="cvPreview">
          <!-- Live preview rendered here -->
        </div>
      </div>
    </div>
  </div>

  <!-- Loading overlay -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-card">
      <div class="spinner"></div>
      <p>Génération du PDF en cours...</p>
    </div>
  </div>

  <script src="app.js"></script>
</body>

</html>
